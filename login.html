<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basquete login</title>
<link rel="stylesheet" href="login/login.css">

</head>
<body>
    
<section class="screen">
<div class="home-content">
<h1 class="logo">Login page</h1>
<form  id="login-form" class="menu">
    <input type="email" id="email" placeholder="adicione seu email aqui">

    <input type="password" id="password" placeholder="adicione sua senha">

    <button type="submit" class="menu-btn">ACESSAR CONTA</button>
</form>
</div>

<div class="social-login">
<p>Ou entre com:</p>
<div class="social-grid">
    <button class="btn-google" onclick="loginGoogle()">
        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
        Google
    </button>

    <button class="btn-facebook" onclick="loginFacebook()">
        <img src="" alt="Facebook">Facebook
    </button>
</div>
</div>

</section>


</body>
</html>
