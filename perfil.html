<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="estilos/perfil.css">
</head>

<body>

    <section class="main-container">
        <div class="image-perfil">
            <img src="" alt="foto-jogador" class="foto-perfil">

            <label for="upload-foto" class="btn-trocar-foto">📷</label>

            <input type="file" id="display-foto" style="display: none;">
        </div>

        <div class="info-jogador">
            <input type="text" class="input-perfil" placeholder="seu apelido">

            <textarea class="input-perfil-bio" placeholder="Fale um pouco sobre você"></textarea>
        </div>

        <div class="seletores-basquete">
            <label>Sua Posição:</label>
            <select class="option">

                <option>Armador (PG)</option>
                <option>Ala-Armador (SG)</option>
                <option>Ala (SF)</option>
                <option>Ala-Pivô (PF)</option>
                <option>Pivô (C)</option>
            </select>
        </div>

        <button class="btn-salvar">SALVAR ALTERAÇÕES</button>
    </section>

</body>

</html>
