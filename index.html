<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basquete login</title>
    <link rel="stylesheet" href="estilos/login.css">

</head>

<body>

    <section class="screen">
        <div class="home-content">
            <h1 class="logo">Acesse sua conta</h1>
            <form id="login-form" class="menu">
                <input type="email" id="email" placeholder="adicione seu email aqui">

                <input type="password" id="password" placeholder="coloque sua senha">

                <div class="flex-row">
                    <div id="remember">
                        <input type="radio">
                        <label>Remember me </label>
                    </div>
                    <span class="span">Esqueceu sua senha?</span>
                </div>
                <button type="button" class="button-submit" onclick="window.location.href='hub.html'">
                    ENTRAR
                </button>
                <p class="p">Não possui uma conta?
                    <a href="cadastro.html"><span class="span">Cadastre-se</span>
                </p></a>

            </form>
        </div>

        <div class="social-login">
            <p>Ou entre com:</p>
            <div class="social-grid">
                <button class="btn-google" onclick="loginGoogle()">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
                </button>
            </div>
        </div>

    </section>


</body>

</html>
